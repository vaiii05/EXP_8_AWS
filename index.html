<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            text-align: center;
        }

        .container {
            padding: 50px 20px;
        }

        .card {
            background: white;
            color: #333;
            max-width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
        }

        p {
            color: #555;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 25px;
            background: #2575fc;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #6a11cb;
        }

        .socials {
            margin-top: 20px;
        }

        .socials a {
            margin: 0 10px;
            text-decoration: none;
            color: #2575fc;
            font-weight: bold;
        }

        footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <img src="https://via.placeholder.com/120" alt="Profile Picture">

        <h1>Vaibhavi Rai</h1>
        <p>IT Engineering Student | Web Developer | MERN Enthusiast</p>

        <p>
            Passionate about building web applications and exploring new technologies.
        </p>

        <a href="#" class="btn">Contact Me</a>

        <div class="socials">
            <a href="#">GitHub</a>
            <a href="#">LinkedIn</a>
            <a href="#">Email</a>
        </div>
    </div>

    <footer>
        © 2026 Vaibhavi Rai
    </footer>
</div>

</body>
</html>
